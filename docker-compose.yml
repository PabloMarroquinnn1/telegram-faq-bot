version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: smartbot_db
    environment:
      POSTGRES_USER: smartbot_user
      POSTGRES_PASSWORD: smartbot_pass
      POSTGRES_DB: smartbot_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - smartbot_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartbot_user"]
      interval: 30s
      timeout: 5s
      retries: 3

  backend:
    build: ./backend
    container_name: smartbot_backend
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - smartbot_network
    volumes:
      - ./backend:/app

  bot:
    build: ./bot
    container_name: smartbot_bot
    env_file: .env
    depends_on:
      - backend
    networks:
      - smartbot_network
    volumes:
      - ./bot:/app

volumes:
  postgres_data:

networks:
  smartbot_network:
    driver: bridge